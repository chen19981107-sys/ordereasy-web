<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ㄚ嬤灶咖｜線上點餐</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --orange: #E8711A;
      --orange-dark: #c45c10;
      --orange-light: #fff4ec;
      --orange-border: #f5c89a;
      --red: #c0392b;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-sub: #666666;
      --text-hint: #999999;
      --success: #27ae60;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #f0820a 0%, #E8711A 60%, #d4600f 100%);
      padding: 32px 20px 28px;
      text-align: center;
      color: white;
    }
    .header-emoji { font-size: 44px; display: block; margin-bottom: 8px; }
    .header h1 { font-size: 24px; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 6px; }
    .header p { font-size: 13px; opacity: 0.88; line-height: 1.5; }

    /* ── Section ── */
    .section {
      background: var(--surface);
      margin: 12px 12px 0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      padding: 14px 16px 0;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .section-title .req { color: var(--orange); margin-left: 4px; }

    /* ── Field ── */
    .field { padding: 12px 16px; }
    .field-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .req-dot {
      width: 6px; height: 6px;
      background: var(--orange);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .field input[type="text"],
    .field input[type="datetime-local"],
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--orange);
      background: white;
    }
    .field input.err,
    .field textarea.err { border-color: var(--red); background: #fff8f8; }
    .field textarea { resize: none; min-height: 80px; line-height: 1.6; }
    .field-hint { font-size: 12px; color: var(--text-hint); margin-top: 5px; }
    .field-err-msg { font-size: 12px; color: var(--red); margin-top: 5px; font-weight: 600; display: none; }
    .field-err-msg.show { display: block; }
    .field + .field { border-top: 1px solid #f0f0f0; }

    /* ── Menu Items ── */
    .menu-list { padding: 4px 0; }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.15s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item.selected { background: var(--orange-light); }
    .menu-info { flex: 1; min-width: 0; }
    .menu-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-price { font-size: 14px; font-weight: 700; color: var(--orange); margin-top: 2px; }
    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: 12px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 34px; height: 34px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      color: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .qty-btn:active { background: var(--orange-light); border-color: var(--orange); }
    .qty-btn:disabled { color: #ccc; border-color: #e8e8e8; background: #fafafa; cursor: default; }
    .qty-num {
      width: 40px;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      user-select: none;
    }
    .qty-num.active { color: var(--orange); }

    /* ── 已選摘要 ── */
    .summary-box {
      margin: 0 12px;
      background: var(--orange-light);
      border: 1.5px solid var(--orange-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: none;
    }
    .summary-box.show { display: block; }
    .summary-title { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 8px; letter-spacing: 0.3px; }
    .summary-row { font-size: 14px; color: var(--text); line-height: 1.9; display: flex; justify-content: space-between; }
    .summary-divider { border: none; border-top: 1px solid var(--orange-border); margin: 8px 0; }
    .summary-total { font-size: 16px; font-weight: 900; color: var(--orange-dark); display: flex; justify-content: space-between; }
    .menu-err { font-size: 12px; color: var(--red); font-weight: 600; padding: 0 16px 12px; display: none; }
    .menu-err.show { display: block; }

    /* ── Submit ── */
    .submit-wrap { padding: 20px 12px 0; }
    .submit-btn {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--orange), #f0820a);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 900;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,113,26,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .submit-btn:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(232,113,26,0.3); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .submit-note { text-align: center; font-size: 12px; color: var(--text-hint); margin-top: 10px; }

    /* ── Success ── */
    .success-wrap { display: none; padding: 20px 12px; }
    .success-wrap.show { display: block; }
    .success-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 900; color: var(--success); margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--text-sub); line-height: 1.7; margin-bottom: 20px; }
    .success-detail {
      background: #f0faf5;
      border: 1.5px solid #a9dfbf;
      border-radius: 10px;
      padding: 16px;
      text-align: left;
      margin-bottom: 20px;
    }
    .detail-row { font-size: 14px; color: var(--text); line-height: 2; }
    .detail-label { font-weight: 700; color: var(--success); }
    .new-order-btn {
      background: white;
      border: 2px solid var(--orange);
      color: var(--orange);
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    /* ── Loading ── */
    .loading-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    .loading-mask.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-text { color: white; font-size: 15px; font-weight: 700; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-emoji">🍱</span>
  <h1>ㄚ嬤灶咖｜線上點餐</h1>
  <p>每一道餐點，都是ㄚ嬤灶咖用心準備的熟悉滋味。</p>
</div>

<form id="form" novalidate>

  <!-- 姓氏 -->
  <div class="section" style="margin-top:16px;">
    <div class="section-title">顧客資訊</div>
    <div class="field">
      <div class="field-label"><span class="req-dot"></span>您的姓氏</div>
      <input type="text" id="name" placeholder="例：王先生、小美小姐" maxlength="20" />
      <div class="field-err-msg" id="nameErr">請填寫您的姓氏</div>
    </div>
    <div class="field">
      <div class="field-label"><span class="req-dot"></span>手機末三碼</div>
      <input type="text" id="phone" placeholder="000" maxlength="3" inputmode="numeric" />
      <div class="field-hint">用於取餐時核對身份</div>
      <div class="field-err-msg" id="phoneErr">請填寫手機末三碼（3位數字）</div>
    </div>
    <div class="field">
      <div class="field-label"><span class="req-dot"></span>取餐時間</div>
      <input type="datetime-local" id="pickupTime" />
      <div class="field-err-msg" id="timeErr">請選擇取餐時間</div>
    </div>
  </div>

  <!-- 餐點選擇 -->
  <div class="section" style="margin-top:12px;">
    <div class="section-title">餐點選擇 <span class="req">*必填</span></div>
    <div class="menu-list" id="menuList"></div>
    <div class="menu-err" id="menuErr">請至少選擇一項餐點</div>
  </div>

  <!-- 已選摘要 -->
  <div class="summary-box" id="summaryBox" style="margin-top:12px;">
    <div class="summary-title">📋 已選餐點</div>
    <div id="summaryItems"></div>
    <hr class="summary-divider" />
    <div class="summary-total"><span>合計</span><span id="summaryTotal">$0</span></div>
  </div>

  <!-- 備註 -->
  <div class="section" style="margin-top:12px;">
    <div class="field">
      <div class="field-label" style="font-weight:600; color: var(--text-sub);">備註（選填）</div>
      <textarea id="note" placeholder="例：不要蔥、醬汁多一點" rows="3"></textarea>
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-wrap">
    <button type="submit" class="submit-btn" id="submitBtn">確認下單</button>
    <p class="submit-note">送出後將無法修改，請確認內容後再送出</p>
  </div>

</form>

<!-- Success -->
<div class="success-wrap" id="successWrap">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">訂單送出成功！</div>
    <div class="success-sub">感謝您的訂購，我們會盡快為您準備餐點。<br/>請於指定時間前來取餐。</div>
    <div class="success-detail" id="successDetail"></div>
    <button class="new-order-btn" onclick="resetForm()">再次訂購</button>
  </div>
</div>

<!-- Loading -->
<div class="loading-mask" id="loadingMask">
  <div class="spinner"></div>
  <div class="loading-text">訂單送出中…</div>
</div>

<script>
const MENU = [
  { id: 1, name: "泰式拌飯",   price: 140 },
  { id: 2, name: "咖哩雞飯",   price: 140 },
  { id: 3, name: "燒肉丼飯",   price: 100 },
  { id: 4, name: "親子丼飯",   price: 100 },
  { id: 5, name: "牛肉丼飯",   price: 110 },
  { id: 6, name: "鯛魚丼飯",   price: 110 },
  { id: 7, name: "虱目魚丼飯", price: 110 },
  { id: 8, name: "豬多多",     price: 140 },
  { id: 9, name: "牛多多",     price: 160 },
];

const urlParams = new URLSearchParams(window.location.search);
const STORE_ID = urlParams.get("storeId") || "1";
const API_BASE = window.location.origin;
const qty = {};
MENU.forEach(m => qty[m.id] = 0);

// ── 渲染菜單 ──────────────────────────────────────────────────────────────────
function renderMenu() {
  document.getElementById("menuList").innerHTML = MENU.map(m => `
    <div class="menu-item" id="row-${m.id}">
      <div class="menu-info">
        <div class="menu-name">${m.name}</div>
        <div class="menu-price">$${m.price}</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" id="minus-${m.id}" onclick="chg(${m.id},-1)" disabled>−</button>
        <div class="qty-num" id="num-${m.id}">0</div>
        <button type="button" class="qty-btn" onclick="chg(${m.id},1)">＋</button>
      </div>
    </div>
  `).join("");
}

function chg(id, d) {
  qty[id] = Math.max(0, Math.min(99, qty[id] + d));
  document.getElementById(`num-${id}`).textContent = qty[id];
  document.getElementById(`num-${id}`).className = "qty-num" + (qty[id] > 0 ? " active" : "");
  document.getElementById(`minus-${id}`).disabled = qty[id] === 0;
  document.getElementById(`row-${id}`).className = "menu-item" + (qty[id] > 0 ? " selected" : "");
  updateSummary();
  if (qty[id] > 0) document.getElementById("menuErr").classList.remove("show");
}

function getSelected() {
  return MENU.filter(m => qty[m.id] > 0).map(m => ({ id: m.id, name: m.name, price: m.price, qty: qty[m.id] }));
}

function updateSummary() {
  const sel = getSelected();
  const box = document.getElementById("summaryBox");
  if (!sel.length) { box.classList.remove("show"); return; }
  box.classList.add("show");
  let total = 0;
  document.getElementById("summaryItems").innerHTML = sel.map(i => {
    const sub = i.price * i.qty;
    total += sub;
    return `<div class="summary-row"><span>${i.name} × ${i.qty}</span><span>$${sub}</span></div>`;
  }).join("");
  document.getElementById("summaryTotal").textContent = `$${total}`;
}

// ── 預設取餐時間 ──────────────────────────────────────────────────────────────
function setDefaultTime() {
  const now = new Date();
  const d = new Date(now);
  d.setDate(d.getDate() + 1);
  d.setHours(12, 0, 0, 0);
  const p = n => String(n).padStart(2, "0");
  document.getElementById("pickupTime").value =
    `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  const min = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}T${p(now.getHours())}:${p(now.getMinutes())}`;
  document.getElementById("pickupTime").min = min;
}

// ── 手機末三碼只允許數字 ──────────────────────────────────────────────────────
document.getElementById("phone").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "").slice(0, 3);
});

// ── 驗證 ──────────────────────────────────────────────────────────────────────
function validate() {
  let ok = true;
  const setErr = (id, errId, cond) => {
    const el = document.getElementById(id);
    const em = document.getElementById(errId);
    if (cond) { el.classList.add("err"); em.classList.add("show"); ok = false; }
    else { el.classList.remove("err"); em.classList.remove("show"); }
  };
  setErr("name", "nameErr", !document.getElementById("name").value.trim());
  setErr("phone", "phoneErr", !/^\d{3}$/.test(document.getElementById("phone").value.trim()));
  setErr("pickupTime", "timeErr", !document.getElementById("pickupTime").value);
  const noMenu = getSelected().length === 0;
  if (noMenu) document.getElementById("menuErr").classList.add("show");
  else document.getElementById("menuErr").classList.remove("show");
  if (noMenu) ok = false;
  return ok;
}

// ── 送出 ──────────────────────────────────────────────────────────────────────
document.getElementById("form").addEventListener("submit", async e => {
  e.preventDefault();
  if (!validate()) {
    const first = document.querySelector(".err, .menu-err.show");
    if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }
  const items = getSelected();
  const pickupTime = document.getElementById("pickupTime").value;
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const note = document.getElementById("note").value.trim();

  document.getElementById("loadingMask").classList.add("show");
  document.getElementById("submitBtn").disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/order/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ storeId: STORE_ID, name, phoneLastThree: phone, pickupTime: new Date(pickupTime).toISOString(), items, note: note || undefined }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || "訂單送出失敗");
    showSuccess({ name, phone, pickupTime, items, note, orderId: data.orderId });
  } catch (err) {
    alert("❌ " + (err.message || "訂單送出失敗，請稍後再試"));
    document.getElementById("submitBtn").disabled = false;
  } finally {
    document.getElementById("loadingMask").classList.remove("show");
  }
});

// ── 成功畫面 ──────────────────────────────────────────────────────────────────
function showSuccess({ name, phone, pickupTime, items, note, orderId }) {
  document.getElementById("form").style.display = "none";
  document.getElementById("summaryBox").style.display = "none";
  document.getElementById("successWrap").classList.add("show");
  const dt = new Date(pickupTime);
  const p = n => String(n).padStart(2, "0");
  const timeStr = `${dt.getFullYear()}/${p(dt.getMonth()+1)}/${p(dt.getDate())} ${p(dt.getHours())}:${p(dt.getMinutes())}`;
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById("successDetail").innerHTML = `
    <div class="detail-row"><span class="detail-label">訂單編號：</span>#${orderId || "---"}</div>
    <div class="detail-row"><span class="detail-label">姓名：</span>${name}</div>
    <div class="detail-row"><span class="detail-label">手機末三碼：</span>${phone}</div>
    <div class="detail-row"><span class="detail-label">取餐時間：</span>${timeStr}</div>
    <div class="detail-row"><span class="detail-label">餐點：</span>${items.map(i => `${i.name}×${i.qty}`).join("、")}</div>
    <div class="detail-row"><span class="detail-label">合計：</span>$${total}</div>
    ${note ? `<div class="detail-row"><span class="detail-label">備註：</span>${note}</div>` : ""}
  `;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetForm() {
  MENU.forEach(m => qty[m.id] = 0);
  document.getElementById("form").reset();
  document.getElementById("form").style.display = "block";
  document.getElementById("summaryBox").style.display = "";
  document.getElementById("successWrap").classList.remove("show");
  document.getElementById("submitBtn").disabled = false;
  renderMenu();
  updateSummary();
  setDefaultTime();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── 初始化 ────────────────────────────────────────────────────────────────────
renderMenu();
setDefaultTime();
</script>
</body>
</html>
